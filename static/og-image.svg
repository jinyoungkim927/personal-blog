<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- warm ink ground, matches favicon -->
  <rect width="1200" height="630" fill="#16120e"/>

  <!-- faint radial glow behind the tree -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#f4f0e8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f4f0e8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- sumi-ink tree, cream strokes (from favicon) -->
  <g fill="none" stroke="#f4f0e8" stroke-linecap="round" stroke-linejoin="round" transform="translate(600 250) scale(1.05) translate(-100 -168)">
    <path d="M 100 320 C 96 280 104 240 100 200 C 96 160 102 120 98 80 C 96 50 102 30 100 16" stroke-width="9" opacity="0.92"/>
    <path d="M 98 130 C 88 116 72 108 56 102 C 44 98 32 96 22 95" stroke-width="6.5" opacity="0.82"/>
    <path d="M 100 100 C 112 86 130 78 148 72 C 162 68 174 66 184 64" stroke-width="6.5" opacity="0.82"/>
    <path d="M 99 70 C 90 58 76 50 60 44" stroke-width="5" opacity="0.72"/>
    <path d="M 100 50 C 112 40 128 32 144 28" stroke-width="5" opacity="0.72"/>
    <path d="M 99 200 C 88 192 76 188 64 188" stroke-width="4.5" opacity="0.66"/>
  </g>

  <!-- gold leaf buds -->
  <g fill="#d4a24e" transform="translate(600 250) scale(1.05) translate(-100 -168)">
    <circle cx="22" cy="95" r="7"/>
    <circle cx="184" cy="64" r="6"/>
    <circle cx="60" cy="44" r="5"/>
    <circle cx="144" cy="28" r="5"/>
  </g>

  <!-- site title -->
  <text x="600" y="545" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" fill="#fdf8ec" letter-spacing="2">more useless</text>
</svg>
